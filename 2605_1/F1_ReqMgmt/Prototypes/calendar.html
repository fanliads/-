<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>需求管理平台 - 日历视图</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --text-primary: #1d1d1f; --text-secondary: #86868b;
    --border: rgba(0,0,0,0.08); --primary: #0071e3; --primary-hover: #0077ed;
    --success: #34c759; --warning: #ff9500; --danger: #ff3b30;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; overflow: hidden;
  }
  .layout { display: flex; height: 100vh; }
  .sidebar {
    width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 20px 0;
  }
  .logo { padding: 0 24px 24px; font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 24px; margin: 2px 12px;
    border-radius: var(--radius-sm); cursor: pointer; color: var(--text-secondary); text-decoration: none; font-size: 13px; transition: all 0.2s;
  }
  .nav-item:hover, .nav-item.active { background: rgba(0,113,227,0.08); color: var(--primary); font-weight: 500; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .header {
    height: 64px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; padding: 0 32px;
  }
  .header-left { display: flex; align-items: center; gap: 24px; }
  .view-tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: var(--radius-sm); }
  .view-tab { padding: 6px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text-secondary); text-decoration: none; border: none; background: transparent; }
  .view-tab.active { background: var(--surface); color: var(--text-primary); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .btn { padding: 8px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #e8e8ed; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-secondary); }
  .filter-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text-secondary); cursor: pointer; }

  .content-scroll { flex: 1; overflow-y: auto; padding: 24px 32px; }
  .calendar-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .cal-title { font-size: 18px; font-weight: 600; }
  .cal-nav { display: flex; gap: 8px; }
  .cal-nav-btn { padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 13px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .cal-cell { background: var(--surface); min-height: 110px; padding: 8px; }
  .cal-cell.weekend { background: #fafafa; }
  .cal-day { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .cal-day.other { color: var(--text-secondary); }
  .cal-event { padding: 4px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .event-p0 { background: rgba(255,59,48,0.10); color: var(--danger); }
  .event-p1 { background: rgba(255,149,0,0.10); color: #b75c00; }
  .event-p2 { background: rgba(255,204,0,0.12); color: #9a7d00; }
  .event-done { background: rgba(52,199,89,0.10); color: #248a3d; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .header { padding: 0 16px; }
    .content-scroll { padding: 16px; }
    .cal-cell { min-height: 70px; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">需求管理平台</div>
    <a href="kanban.html" class="nav-item"><span>&#9638;</span>看板视图</a>
    <a href="sprint.html" class="nav-item"><span>&#8634;</span>迭代版本</a>
    <a href="raw-pool.html" class="nav-item"><span>&#9993;</span>原始需求池</a>
    <a href="product-pool.html" class="nav-item"><span>&#9776;</span>产品需求池</a>
    <a href="dashboard.html" class="nav-item"><span>&#9733;</span>数据看板</a>
  </aside>

  <main class="main">
    <header class="header">
      <div class="header-left">
        <div class="view-tabs">
          <a href="kanban.html" class="view-tab">看板</a>
          <a href="calendar.html" class="view-tab active">日历</a>
          <a href="priority.html" class="view-tab">优先级</a>
          <a href="pm-tasks.html" class="view-tab">产品经理任务</a>
          <a href="sprint.html" class="view-tab">迭代版本</a>
          <a href="progress.html" class="view-tab">进度看板</a>
        </div>
      </div>
      <div class="header-right">
        <div class="filter-chip">月视图 &#9662;</div>
        <div class="avatar">PM</div>
      </div>
    </header>

    <div class="content-scroll">
      <div class="calendar-wrap">
        <div class="cal-header">
          <div class="cal-title">2026年 5月</div>
          <div class="cal-nav">
            <button class="cal-nav-btn">&lt;</button>
            <button class="cal-nav-btn">今天</button>
            <button class="cal-nav-btn">&gt;</button>
          </div>
        </div>
        <div class="cal-grid">
          <div class="cal-cell weekend"><div class="cal-day other">27</div></div>
          <div class="cal-cell"><div class="cal-day other">28</div></div>
          <div class="cal-cell"><div class="cal-day other">29</div></div>
          <div class="cal-cell"><div class="cal-day other">30</div></div>
          <div class="cal-cell"><div class="cal-day">1</div></div>
          <div class="cal-cell weekend"><div class="cal-day">2</div></div>
          <div class="cal-cell weekend"><div class="cal-day">3</div></div>

          <div class="cal-cell weekend"><div class="cal-day">4</div></div>
          <div class="cal-cell"><div class="cal-day">5</div></div>
          <div class="cal-cell"><div class="cal-day">6</div></div>
          <div class="cal-cell"><div class="cal-day">7</div></div>
          <div class="cal-cell"><div class="cal-day">8</div></div>
          <div class="cal-cell weekend"><div class="cal-day">9</div></div>
          <div class="cal-cell weekend"><div class="cal-day">10</div></div>

          <div class="cal-cell weekend"><div class="cal-day">11</div></div>
          <div class="cal-cell"><div class="cal-day">12</div></div>
          <div class="cal-cell"><div class="cal-day">13</div></div>
          <div class="cal-cell"><div class="cal-day">14</div></div>
          <div class="cal-cell"><div class="cal-day">15</div></div>
          <div class="cal-cell weekend"><div class="cal-day">16</div></div>
          <div class="cal-cell weekend"><div class="cal-day">17</div></div>

          <div class="cal-cell weekend"><div class="cal-day">18</div></div>
          <div class="cal-cell"><div class="cal-day">19</div><div class="cal-event event-p1">台州采购平台优化</div></div>
          <div class="cal-cell"><div class="cal-day">20</div></div>
          <div class="cal-cell"><div class="cal-day">21</div><div class="cal-event event-p0">食堂对账优化上线</div></div>
          <div class="cal-cell"><div class="cal-day">22</div><div class="cal-event event-p1">数据报表导出截止</div></div>
          <div class="cal-cell weekend"><div class="cal-day">23</div></div>
          <div class="cal-cell weekend"><div class="cal-day">24</div></div>

          <div class="cal-cell weekend"><div class="cal-day">25</div><div class="cal-event event-p1">台州平台期望上线</div></div>
          <div class="cal-cell"><div class="cal-day">26</div></div>
          <div class="cal-cell"><div class="cal-day">27</div></div>
          <div class="cal-cell"><div class="cal-day">28</div><div class="cal-event event-p0">支付通道扩容截止</div></div>
          <div class="cal-cell"><div class="cal-day">29</div></div>
          <div class="cal-cell weekend"><div class="cal-day">30</div><div class="cal-event event-p2">嘉兴仓储屏截止</div></div>
          <div class="cal-cell weekend"><div class="cal-day">31</div><div class="cal-event event-p0">南昌青山湖截止</div></div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
