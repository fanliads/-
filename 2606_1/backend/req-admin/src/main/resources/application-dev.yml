spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/req_mgmt?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASS:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 2
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:change-me-dev-secret-for-local-jwt-signing-2026}
  expiration: 86400000

knife4j:
  enable: true

ai:
  priority:
    provider: ${AI_PRIORITY_PROVIDER:deepseek}
    enabled: ${AI_PRIORITY_ENABLED:false}
    base-url: ${AI_PRIORITY_BASE_URL:https://api.deepseek.com}
    api-key: ${AI_PRIORITY_API_KEY:}
    model: ${AI_PRIORITY_MODEL:deepseek-v4-flash}
    timeout-ms: ${AI_PRIORITY_TIMEOUT_MS:5000}
    retry-max: ${AI_PRIORITY_RETRY_MAX:1}
    max-tokens: ${AI_PRIORITY_MAX_TOKENS:800}
    rules-text: ${AI_PRIORITY_RULES_TEXT:按固定业务规则输出一级A类（P0）、一级B类（P1）、二级（P2）、三级（P3），AI仅做解释增强。}

notification:
  wecom:
    enabled: ${WECOM_NOTIFICATION_ENABLED:false}
    webhook-url: ${WECOM_NOTIFICATION_WEBHOOK_URL:}
    timeout-ms: ${WECOM_NOTIFICATION_TIMEOUT_MS:3000}
