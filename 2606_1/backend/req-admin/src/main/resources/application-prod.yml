spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/req_mgmt?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASS:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 2
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

jwt:
  secret: ${JWT_SECRET:reqmgmt-secret-key-2024-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000

knife4j:
  enable: false
