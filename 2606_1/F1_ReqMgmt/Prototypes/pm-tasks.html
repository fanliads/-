<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>需求管理平台 - 产品经理任务</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --text-primary: #1d1d1f; --text-secondary: #86868b;
    --border: rgba(0,0,0,0.08); --primary: #0071e3; --primary-hover: #0077ed;
    --success: #34c759; --warning: #ff9500; --danger: #ff3b30;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 16px 32px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; overflow: hidden;
  }
  .layout { display: flex; height: 100vh; }
  .sidebar {
    width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 20px 0;
  }
  .logo { padding: 0 24px 24px; font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 24px; margin: 2px 12px;
    border-radius: var(--radius-sm); cursor: pointer; color: var(--text-secondary); text-decoration: none; font-size: 13px; transition: all 0.2s;
  }
  .nav-item:hover, .nav-item.active { background: rgba(0,113,227,0.08); color: var(--primary); font-weight: 500; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .header {
    height: 64px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; padding: 0 32px;
  }
  .header-left { display: flex; align-items: center; gap: 24px; }
  .view-tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: var(--radius-sm); }
  .view-tab { padding: 6px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text-secondary); text-decoration: none; border: none; background: transparent; }
  .view-tab.active { background: var(--surface); color: var(--text-primary); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .search-box { width: 240px; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); font-size: 13px; outline: none; }
  .search-box:focus { border-color: var(--primary); }
  .btn { padding: 8px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #e8e8ed; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-secondary); }
  .filter-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text-secondary); cursor: pointer; }

  .content-scroll { flex: 1; overflow-y: auto; padding: 24px 32px; }
  .pm-board { display: flex; gap: 16px; }
  .pm-column { width: 300px; display: flex; flex-direction: column; gap: 10px; }
  .pm-header {
    display: flex; align-items: center; gap: 10px; padding: 0 4px 8px;
  }
  .pm-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .pm-name { font-size: 13px; font-weight: 600; }
  .pm-count { font-size: 11px; color: var(--text-secondary); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
  .pm-load { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .load-safe { background: rgba(52,199,89,0.10); color: #248a3d; }
  .load-warn { background: rgba(255,149,0,0.10); color: #b75c00; }
  .load-danger { background: rgba(255,59,48,0.08); color: var(--danger); }
  .column-body {
    background: rgba(0,0,0,0.02); border-radius: var(--radius); padding: 10px;
    display: flex; flex-direction: column; gap: 8px; min-height: 120px;
  }
  .card {
    background: var(--surface); border-radius: var(--radius-sm); padding: 14px;
    box-shadow: var(--shadow); cursor: grab; transition: all 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .card.dragging { opacity: 0.5; transform: rotate(2deg); }
  .column-body.drag-over { background: rgba(0,113,227,0.06); border: 2px dashed var(--primary); }
  .card-priority {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
    font-weight: 600; margin-bottom: 8px;
  }
  .priority-p0 { background: rgba(255,59,48,0.10); color: var(--danger); }
  .priority-p1 { background: rgba(255,149,0,0.10); color: #b75c00; }
  .priority-p2 { background: rgba(255,204,0,0.12); color: #9a7d00; }
  .card-title { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 10px; }
  .card-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-secondary); }
  .card-tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; background: rgba(0,113,227,0.08); color: var(--primary); }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .pm-board { flex-direction: column; }
    .pm-column { width: 100%; }
    .header { padding: 0 16px; }
    .content-scroll { padding: 16px; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">需求管理平台</div>
    <a href="kanban.html" class="nav-item"><span>&#9638;</span>看板视图</a>
    <a href="sprint.html" class="nav-item"><span>&#8634;</span>迭代版本</a>
    <a href="raw-pool.html" class="nav-item"><span>&#9993;</span>原始需求池</a>
    <a href="product-pool.html" class="nav-item"><span>&#9776;</span>产品需求池</a>
    <a href="dashboard.html" class="nav-item"><span>&#9733;</span>数据看板</a>
  </aside>

  <main class="main">
    <header class="header">
      <div class="header-left">
        <div class="view-tabs">
          <a href="kanban.html" class="view-tab">看板</a>
          <a href="calendar.html" class="view-tab">日历</a>
          <a href="priority.html" class="view-tab">优先级</a>
          <a href="pm-tasks.html" class="view-tab active">产品经理任务</a>
          <a href="sprint.html" class="view-tab">迭代版本</a>
          <a href="progress.html" class="view-tab">进度看板</a>
        </div>
      </div>
      <div class="header-right">
        <input class="search-box" placeholder="搜索需求...">
        <button class="btn btn-primary">+ 新建需求</button>
        <div class="avatar">PM</div>
      </div>
    </header>

    <div class="content-scroll">
      <div class="pm-board">
        <div class="pm-column">
          <div class="pm-header">
            <div class="pm-avatar">郑</div>
            <div class="pm-name">郑文明</div>
            <div class="pm-count">5个需求</div>
            <div class="pm-load load-safe">负载正常</div>
          </div>
          <div class="column-body">
            <div class="card">
              <span class="card-priority priority-p1">P1</span>
              <div class="card-title">山东互联网+明厨亮灶项目</div>
              <div class="card-meta">
                <span class="card-tag">市监G端</span>
                <span>6-11 截止</span>
              </div>
            </div>
            <div class="card">
              <span class="card-priority priority-p0">P0</span>
              <div class="card-title">智慧食堂支付通道扩容</div>
              <div class="card-meta">
                <span class="card-tag">校园G端</span>
                <span>5-28 截止</span>
              </div>
            </div>
          </div>
        </div>

        <div class="pm-column">
          <div class="pm-header">
            <div class="pm-avatar" style="background:var(--success);">李</div>
            <div class="pm-name">李产品</div>
            <div class="pm-count">8个需求</div>
            <div class="pm-load load-warn">负载偏高</div>
          </div>
          <div class="column-body">
            <div class="card">
              <span class="card-priority priority-p1">P1</span>
              <div class="card-title">采购平台供应商入驻流程优化</div>
              <div class="card-meta">
                <span class="card-tag">校园G端</span>
                <span>6-15 截止</span>
              </div>
            </div>
            <div class="card">
              <span class="card-priority priority-p2">P2</span>
              <div class="card-title">仓储屏数据同步延迟优化</div>
              <div class="card-meta">
                <span class="card-tag">校园G端</span>
                <span>6-20 截止</span>
              </div>
            </div>
          </div>
        </div>

        <div class="pm-column">
          <div class="pm-header">
            <div class="pm-avatar" style="background:var(--warning);">王</div>
            <div class="pm-name">王产品</div>
            <div class="pm-count">12个需求</div>
            <div class="pm-load load-danger">负载过载</div>
          </div>
          <div class="column-body">
            <div class="card">
              <span class="card-priority priority-p2">P2</span>
              <div class="card-title">嘉兴市仓储屏系统优化</div>
              <div class="card-meta">
                <span class="card-tag">校园G端</span>
                <span>5-30 截止</span>
              </div>
            </div>
            <div class="card">
              <span class="card-priority priority-p1">P1</span>
              <div class="card-title">教育局数据报表导出功能</div>
              <div class="card-meta">
                <span class="card-tag">校园G端</span>
                <span>5-22 截止</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;" id="statusToast"></div>

<script>
let draggedCard=null, dragSource=null;
function showToast(m){ const t=document.getElementById('statusToast'); t.textContent=m; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2500); }
function updateCount(col){ const c=col.querySelectorAll('.card').length; col.querySelector('.pm-count').textContent=c+'个需求'; }

document.querySelectorAll('.pm-column .card').forEach(card=>{
  card.setAttribute('draggable','true');
  card.addEventListener('dragstart',function(e){ draggedCard=this; dragSource=this.parentElement; this.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  card.addEventListener('dragend',function(){ this.classList.remove('dragging'); document.querySelectorAll('.column-body').forEach(b=>b.classList.remove('drag-over')); });
});

document.querySelectorAll('.pm-column .column-body').forEach(body=>{
  body.addEventListener('dragover',function(e){ e.preventDefault(); this.classList.add('drag-over'); });
  body.addEventListener('dragleave',function(){ this.classList.remove('drag-over'); });
  body.addEventListener('drop',function(e){
    e.preventDefault(); this.classList.remove('drag-over');
    if(!draggedCard||this===dragSource) return;
    this.appendChild(draggedCard);
    const oldPM=dragSource.closest('.pm-column').querySelector('.pm-name').textContent;
    const newPM=this.closest('.pm-column').querySelector('.pm-name').textContent;
    updateCount(dragSource.closest('.pm-column'));
    updateCount(this.closest('.pm-column'));
    showToast('✓ '+draggedCard.querySelector('.card-title').textContent+'：'+oldPM+' → '+newPM);
  });
});
</script>
</body>
</html>
