<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>需求管理平台 - 我的待办</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --text-primary: #1d1d1f; --text-secondary: #86868b;
    --border: rgba(0,0,0,0.08); --primary: #0071e3; --primary-hover: #0077ed;
    --success: #34c759; --warning: #ff9500; --danger: #ff3b30;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 16px 32px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; overflow: hidden;
  }
  .layout { display: flex; height: 100vh; }
  .sidebar {
    width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 20px 0;
  }
  .logo { padding: 0 24px 24px; font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 24px; margin: 2px 12px;
    border-radius: var(--radius-sm); cursor: pointer; color: var(--text-secondary); text-decoration: none; font-size: 13px; transition: all 0.2s;
  }
  .nav-item:hover, .nav-item.active { background: rgba(0,113,227,0.08); color: var(--primary); font-weight: 500; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .header {
    height: 64px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; padding: 0 32px;
  }
  .header-left { display: flex; align-items: center; gap: 24px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .search-box { width: 240px; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); font-size: 13px; outline: none; }
  .btn { padding: 8px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-success { background: rgba(52,199,89,0.10); color: #248a3d; }
  .btn-danger { background: rgba(255,59,48,0.08); color: var(--danger); }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #e8e8ed; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-secondary); }

  .content-scroll { flex: 1; overflow-y: auto; padding: 24px 32px; }
  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .task-group { margin-bottom: 28px; }
  .group-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .task-card {
    background: var(--surface); border-radius: var(--radius); padding: 18px 20px;
    box-shadow: var(--shadow); margin-bottom: 10px; display: flex; align-items: center; gap: 16px;
    transition: all 0.2s; cursor: pointer;
  }
  .task-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .task-priority {
    width: 4px; align-self: stretch; border-radius: 2px;
  }
  .task-p0 { background: var(--danger); }
  .task-p1 { background: var(--warning); }
  .task-p2 { background: #ffcc00; }
  .task-body { flex: 1; }
  .task-title { font-weight: 500; font-size: 15px; margin-bottom: 6px; }
  .task-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); }
  .task-tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; background: rgba(0,113,227,0.08); color: var(--primary); }
  .task-countdown { font-size: 12px; font-weight: 600; color: var(--danger); }
  .task-countdown.safe { color: var(--success); }
  .task-actions { display: flex; gap: 8px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .header { padding: 0 16px; }
    .content-scroll { padding: 16px; }
    .task-card { flex-direction: column; align-items: flex-start; gap: 10px; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">需求管理平台</div>
    <a href="kanban.html" class="nav-item"><span>&#9638;</span>看板视图</a>
    <a href="sprint.html" class="nav-item"><span>&#8634;</span>迭代版本</a>
    <a href="raw-pool.html" class="nav-item"><span>&#9993;</span>原始需求池</a>
    <a href="product-pool.html" class="nav-item"><span>&#9776;</span>产品需求池</a>
    <a href="dashboard.html" class="nav-item"><span>&#9733;</span>数据看板</a>
  </aside>

  <main class="main">
    <header class="header">
      <div class="header-left"><h1 style="font-size:16px;font-weight:600;">我的待办</h1></div>
      <div class="header-right">
        <input class="search-box" placeholder="搜索...">
        <div class="avatar">PM</div>
      </div>
    </header>

    <div class="content-scroll">
      <div class="task-group">
        <div class="group-label">待我处理（3）</div>
        <div class="task-card">
          <div class="task-priority task-p0"></div>
          <div class="task-body">
            <div class="task-title">台州各区县采购平台优化</div>
            <div class="task-meta">
              <span>RAW-20260520-001</span>
              <span class="task-tag">待项目经理评估</span>
              <span>商务-饭粒 提交</span>
            </div>
          </div>
          <div class="task-countdown">还剩 3 天截止</div>
          <div class="task-actions">
            <button class="btn btn-success">承接</button>
            <button class="btn btn-danger">拒绝</button>
          </div>
        </div>

        <div class="task-card">
          <div class="task-priority task-p1"></div>
          <div class="task-body">
            <div class="task-title">山东互联网+明厨亮灶项目</div>
            <div class="task-meta">
              <span>RAW-20260520-003</span>
              <span class="task-tag">待产品总监判定</span>
              <span>项目经理-张三 已承接</span>
            </div>
          </div>
          <div class="task-countdown safe">还剩 18 天截止</div>
          <div class="task-actions">
            <button class="btn btn-success">判定为标准产品</button>
            <button class="btn btn-ghost">定制化</button>
          </div>
        </div>

        <div class="task-card">
          <div class="task-priority task-p1"></div>
          <div class="task-body">
            <div class="task-title">教育局数据报表导出功能</div>
            <div class="task-meta">
              <span>PRD-20260518-004</span>
              <span class="task-tag">研发中</span>
              <span>产品经理-李四 指派</span>
            </div>
          </div>
          <div class="task-countdown">还剩 1 天截止</div>
          <div class="task-actions">
            <button class="btn btn-success">提交测试</button>
          </div>
        </div>
      </div>

      <div class="task-group">
        <div class="group-label">本周已处理（2）</div>
        <div class="task-card">
          <div class="task-priority task-p2" style="background:#d1d1d6;"></div>
          <div class="task-body">
            <div class="task-title">仓储屏UI交互改版</div>
            <div class="task-meta">
              <span>PRD-20260510-005</span>
              <span class="task-tag">设计中</span>
              <span>已于 5-18 提交确认</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="btn btn-ghost">查看</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
